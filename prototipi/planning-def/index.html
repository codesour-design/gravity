<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gravity — Planning (nuova rotta)</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/antd@5/dist/reset.css" />
  <script src="https://unpkg.com/dayjs@1/dayjs.min.js"></script>
  <script src="https://unpkg.com/antd@5/dist/antd.min.js"></script>
  <script src="https://unpkg.com/@ant-design/icons@5/dist/index.umd.js"></script>
  <script src="../tokens.js"></script>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster@1.5/dist/leaflet.markercluster.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--gravity-font-body);
      background: var(--gravity-bg);
      color: var(--gravity-text);
      font-size: 14px;
      line-height: 1.5714;
    }

    /* ── App shell ─────────────────────────────────────── */
    .app-shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .app-main {
      flex: 1;
      overflow-y: auto;
      background: #F5F5F5;
    }

    /* ── Navbar (Ant Design System for Gravity) ────────── */
    .top-nav {
      height: 73px;
      background: #ffffff;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 100;
    }
    .top-nav-logo {
      display: flex;
      align-items: center;
      padding: 0 20px;
      height: 100%;
      flex-shrink: 0;
    }
    .top-nav-logo img { display: block; }
    .top-nav-menu-wrap {
      flex: 1;
      align-self: stretch;
      display: flex;
      align-items: stretch;
    }
    /* override antd Menu horizontal border */
    .top-nav-menu-wrap .ant-menu-horizontal {
      border-bottom: none !important;
      height: 73px;
      line-height: 73px;
    }
    .top-nav-menu-wrap .ant-menu-horizontal > .ant-menu-item,
    .top-nav-menu-wrap .ant-menu-horizontal > .ant-menu-submenu {
      height: 73px;
      line-height: 73px;
      padding: 0 16px;
      top: 0;
    }
    .top-nav-menu-wrap .ant-menu-horizontal > .ant-menu-item::after,
    .top-nav-menu-wrap .ant-menu-horizontal > .ant-menu-submenu::after {
      bottom: 0 !important;
      border-bottom-width: 2px !important;
    }
    .top-nav-right {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 0 20px;
      flex-shrink: 0;
    }
    .top-nav-bell {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      color: rgba(0,0,0,0.65);
      padding: 4px;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .top-nav-bell:hover { background: rgba(0,0,0,0.04); }

    /* ── back link (usato nell'header card) ── */
    .plh-back {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: #3E00FB;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .plh-back:hover { opacity: 0.75; }
    /* ── NuovaRotta: brief panel sinistro ── */
    .ss-workspace-nr {
      display: flex;
      flex-direction: row;
      flex: 1;
      min-height: 0;
    }
    .bpn {
      width: 264px;
      flex-shrink: 0;
      overflow-y: auto;
      background: transparent;
      padding: 0 0 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .ss-main-nr {
      flex: 1;
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 0 0 0 16px;
    }

    .bpn-footer {
      margin-top: auto;
      padding-top: 8px;
    }
    .bpn-toggle-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 7px 12px;
      border-radius: 6px;
      border: 1px solid #E8E8E8;
      background: #fff;
      color: rgba(0,0,0,0.45);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .bpn-toggle-btn:hover {
      border-color: #3E00FB;
      color: #3E00FB;
      background: #F9F7FF;
    }
    .bpn-collapsed {
      width: 28px;
      flex-shrink: 0;
      background: #fff;
      border-right: 1px solid #F0F0F0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s;
    }
    .bpn-collapsed:hover { background: #F9F7FF; }
    .bpn-collapsed-label {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      font-size: 11px;
      font-weight: 600;
      color: rgba(0,0,0,0.35);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      user-select: none;
    }
    .bpn-collapsed:hover .bpn-collapsed-label { color: #3E00FB; }
    /* ── DataCard — pattern comune a tutte le schermate ── */
    .data-card {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #F0F0F0;
      overflow: visible;
    }
    .data-card-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: none;
    }
    .data-card-head-icon {
      color: rgba(0,0,0,0.65);
      font-size: 16px;
      display: flex;
      align-items: center;
    }
    .data-card-head-label {
      font-size: 12px;
      font-weight: 500;
      color: rgba(0,0,0,0.88);
    }
    .data-card-body {
      padding: 20px 12px 12px;
    }
    .data-card-value {
      font-size: 20px;
      font-weight: 400;
      color: rgba(0,0,0,0.88);
      line-height: 1.3;
      display: block;
    }
    .data-card-action {
      padding: 8px 12px;
      border-top: 1px solid #F0F0F0;
    }
    /* DataCard value — nel brief panel sidebar */
    .bpn .data-card-value {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.4;
    }
    .bpn .data-card-body {
      padding: 8px 12px 12px;
    }
    /* SelectSystems root (nuova rotta) */
    .ss-root-nr {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 73px);
      overflow: hidden;
    }
    /* SelectSystems content wrapper */
    .ss-content-nr {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      overflow: hidden;
      background: #F5F5F5;
    }

    /* ── Shared page layout ────────────────────────────── */
    .page-content {
      padding: 20px 24px;
      min-height: 100%;
    }
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    /* ── Plannings List ─────────────────────────────────── */
    .planning-name-cell { display: flex; align-items: center; gap: 7px; }
    .planning-name-eye {
      color: #3E00FB; font-size: 13px; opacity: 0;
      transition: opacity 0.15s; flex-shrink: 0;
    }
    .ant-table-row:hover .planning-name-eye { opacity: 1; }
    .ant-table-tbody > tr.ant-table-row:hover > td { background: rgba(62,0,251,0.04) !important; }

    .advertiser-link {
      color: #3E00FB;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
    }
    .advertiser-link:hover { text-decoration: underline; }
    .share-link {
      color: #3E00FB;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ── Planning Detail ───────────────────────────────── */
    .detail-layout {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .detail-sidebar {
      width: 260px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 49px;
    }
    .detail-main {
      flex: 1;
      min-width: 0;
      background: #fff;
      border-radius: 8px;
      border: 1px solid #F0F0F0;
      overflow: hidden;
    }

    .detail-main-header {
      padding: 14px 16px;
      border-bottom: 1px solid #F0F0F0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* ── View toggle buttons ───────────────────────────── */
    .view-toggle { display: flex; gap: 2px; }
    .view-toggle-btn {
      background: none;
      border: 1px solid #D9D9D9;
      cursor: pointer;
      padding: 5px 8px;
      color: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      font-size: 14px;
      transition: all 0.15s;
    }
    .view-toggle-btn:first-child { border-radius: 6px 0 0 6px; }
    .view-toggle-btn:last-child { border-radius: 0 6px 6px 0; }
    .view-toggle-btn:not(:first-child) { border-left: none; }
    .view-toggle-btn.active {
      background: #F0EAFF;
      color: #3E00FB;
      border-color: #3E00FB;
      z-index: 1;
    }
    .view-toggle-btn:hover:not(.active) { background: rgba(0,0,0,0.04); color: rgba(0,0,0,0.65); }

    /* ── SVG Map ───────────────────────────────────────── */
    .map-container {
      position: relative;
      width: 100%;
      height: 480px;
      overflow: hidden;
      background: #E3EBF3;
    }
    .map-svg { width: 100%; height: 100%; display: block; }
    .map-legend {
      position: absolute;
      bottom: 16px;
      left: 16px;
      background: #fff;
      border-radius: 8px;
      padding: 12px 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 12px;
    }
    .map-legend-item { display: flex; align-items: center; gap: 8px; }

    /* ── Systems list view ─────────────────────────────── */
    .system-card {
      border-bottom: 1px solid #F0F0F0;
    }
    .system-card:last-child { border-bottom: none; }
    .system-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      cursor: pointer;
    }
    .system-card-header:hover { background: rgba(0,0,0,0.02); }
    .system-card-left { display: flex; align-items: center; gap: 8px; }
    .system-avail-bar {
      width: 4px;
      align-self: stretch;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .system-card-expanded {
      padding: 0 16px 16px 20px;
      border-top: 1px solid #F5F5F5;
      background: #FAFAFA;
    }
    .system-face-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .system-face-table th {
      text-align: left;
      padding: 6px 8px;
      color: rgba(0,0,0,0.45);
      font-weight: 500;
      border-bottom: 1px solid #F0F0F0;
      background: #fff;
    }
    .system-face-table td {
      padding: 8px 8px;
      border-bottom: 1px solid #F5F5F5;
      color: rgba(0,0,0,0.65);
    }

    /* ── Select Systems ─────────────────────────────────── */
    .ss-root {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 73px);
      overflow: hidden;
      background: #F5F5F5;
      padding: 24px;
      gap: 12px;
    }
    .ss-card {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #F0F0F0;
      flex-shrink: 0;
    }
    /* Card 1 — Header */
    .ss-card-header { padding: 14px 20px 16px; }
    .ss-header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .ss-breadcrumb {
      color: rgba(0,0,0,0.45);
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.15s;
    }
    .ss-breadcrumb:hover { color: #3E00FB; }
    .ss-title-row { display: flex; align-items: center; justify-content: space-between; }
    .ss-title-meta { display: flex; align-items: center; gap: 10px; }
    /* Card 2 — Search */
    .ss-card-search { padding: 14px 20px; }
    .ss-search-bar { display: flex; gap: 8px; align-items: center; }
    .ss-search-input-wrap { flex: 1; position: relative; }
    /* Unified search bar */
    .ss-search-unified {
      display: flex; align-items: center; flex: 1;
      border: 1.5px solid #d9d9d9; border-radius: 10px; background: #fff;
      position: relative; height: 52px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .ss-search-unified:focus-within {
      border-color: #3E00FB;
      box-shadow: 0 0 0 3px rgba(62,0,251,0.1);
    }
    .ss-search-unified .ant-input-affix-wrapper {
      flex: 1; min-width: 0;
      border: none !important; box-shadow: none !important;
      border-radius: 10px 0 0 10px !important; background: transparent !important;
      height: 100%; font-size: 16px;
    }
    .ss-search-unified .ant-input-affix-wrapper:hover { background: transparent !important; }
    .ss-vdivider { width: 1px; height: 22px; background: #e4e4e4; flex-shrink: 0; margin: 0 2px; }
    .ss-filter-inline.ant-btn {
      border: 1px solid #d9d9d9 !important; box-shadow: none !important;
      border-radius: 7px !important; height: 38px !important;
      margin: 0 4px; padding: 0 14px;
      background: #fff !important; color: rgba(0,0,0,0.88) !important;
      font-weight: 400;
    }
    .ss-filter-inline.ant-btn:hover {
      border-color: #3E00FB !important; color: #3E00FB !important;
      background: #fff !important;
    }
    .ss-cerca-inline.ant-btn {
      border: none !important; box-shadow: none !important;
      border-radius: 7px !important; height: 38px !important;
      margin: 0 7px 0 4px; padding: 0 22px; font-weight: 500;
    }
    .ss-suggestions-wrap {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: #fff;
      border: 1px solid #E8E8E8;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      z-index: 9999;
      overflow: hidden;
    }
    .ss-suggestion-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      cursor: pointer;
      font-size: 13px;
      color: rgba(0,0,0,0.65);
      transition: background 0.1s;
    }
    .ss-suggestion-item:hover { background: #F5F5F5; }
    .ss-brief-chips {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .ss-brief-label {
      font-size: 11px;
      color: rgba(0,0,0,0.35);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
      margin-right: 2px;
    }
    .ss-brief-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 12px;
      border: 1px solid #E8E8E8;
      font-size: 12px;
      color: rgba(0,0,0,0.65);
      cursor: pointer;
      background: #FAFAFA;
      transition: all 0.15s;
      user-select: none;
    }
    .ss-brief-chip:hover { border-color: #3E00FB; color: #3E00FB; background: #F0EAFF; }
    .ss-brief-chip-active {
      background: #F0EAFF;
      border-color: #3E00FB;
      color: #3E00FB;
      font-weight: 500;
    }
    .ss-brief-chip-active:hover { background: #E8DFFF; }
    /* ── Brief bar (info brief nel header SelectSystems) ────── */
    .ss-brief-bar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px 0;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(0,0,0,0.06);
    }
    .ss-brief-field {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0 14px;
      border-right: 1px solid rgba(0,0,0,0.08);
    }
    .ss-brief-field:first-child { padding-left: 0; }
    .ss-brief-field:last-child { border-right: none; }
    .ss-brief-key {
      font-size: 11px;
      font-weight: 600;
      color: rgba(0,0,0,0.35);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      white-space: nowrap;
    }
    .ss-brief-val {
      font-size: 13px;
      color: rgba(0,0,0,0.88);
      font-weight: 500;
      white-space: nowrap;
    }
    .ss-brief-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      align-items: center;
    }
    /* Card 3 — Map */
    .ss-card-map {
      flex: 1;
      overflow: hidden;
      position: relative;
      min-height: 0;
    }
    .ss-leaflet-map {
      position: absolute;
      inset: 0;
      z-index: 1;
    }
    .ss-leaflet-map .leaflet-tile-pane { filter: saturate(2.2) hue-rotate(10deg) brightness(1.03); }
    /* Right panel (Google Maps style) */
    .ss-panel {
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 420px;
      background: #fff;
      box-shadow: -2px 0 20px rgba(0,0,0,0.13);
      display: flex;
      flex-direction: column;
      z-index: 500;
      transition: transform 0.25s ease;
    }
    .ss-panel-hidden { transform: translateX(420px); }
    .ss-panel-toggle {
      position: absolute;
      left: -32px; top: 50%;
      transform: translateY(-50%);
      background: #fff;
      border: 1px solid #E8E8E8;
      border-right: none;
      border-radius: 6px 0 0 6px;
      width: 32px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow: -3px 0 8px rgba(0,0,0,0.08);
      color: rgba(0,0,0,0.4);
      z-index: 501;
      transition: color 0.15s;
    }
    .ss-panel-toggle:hover { color: #3E00FB; }
    .ss-panel-header {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid #F0F0F0;
      gap: 4px;
      flex-shrink: 0;
      background: #FAFAFA;
    }
    .ss-panel-tab {
      flex: 1;
      padding: 6px 8px;
      font-size: 13px;
      font-weight: 500;
      color: rgba(0,0,0,0.45);
      cursor: pointer;
      text-align: center;
      border-radius: 6px;
      transition: all 0.15s;
      user-select: none;
    }
    .ss-panel-tab.active { background: #F0EAFF; color: #3E00FB; }
    .ss-panel-body { flex: 1; overflow-y: auto; }
    .ss-system-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid #F5F5F5;
      cursor: pointer;
      transition: background 0.1s;
    }
    .ss-system-item:last-child { border-bottom: none; }
    .ss-system-item:hover { background: #FAFAFA; }
    .ss-system-item.ss-item-selected { background: #F7F5FF; }
    .ss-system-item.ss-item-hovered { background: #F2F2F2; }
    .ss-system-info { flex: 1; min-width: 0; }
    .ss-system-code {
      font-size: 11px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: rgba(0,0,0,0.30);
      margin-bottom: 2px;
    }
    .ss-system-address {
      font-size: 13px;
      color: rgba(0,0,0,0.88);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ss-system-tags {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 4px;
      flex-wrap: wrap;
    }
    .ss-panel-empty { padding: 40px 20px; text-align: center; }

    /* Panel toolbar — select all */
    .ss-panel-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 14px;
      background: #F7F5FF;
      border-bottom: 1px solid #E4DCFF;
      flex-shrink: 0;
    }
    .ss-panel-toolbar-info {
      font-size: 12px;
      color: rgba(0,0,0,0.45);
    }
    .ss-panel-toolbar-action {
      font-size: 12px;
      color: #3E00FB;
      font-weight: 500;
      cursor: pointer;
    }
    .ss-panel-toolbar-action:hover { text-decoration: underline; }

    /* Accordion system row */
    .ss-sys-row { border-bottom: 1px solid #F0F0F0; }
    .ss-sys-row:last-child { border-bottom: none; }

    .ss-sys-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      transition: background 0.1s;
    }
    .ss-sys-head:hover { background: #FAFAFA; }
    .ss-sys-head.ss-sys-selected { background: #F7F5FF; }
    .ss-sys-head.ss-sys-hovered  { background: #F3F3F3; }

    /* Left accent bar */
    .ss-sys-accent {

function AdvertiserAvatar({ name, size = 32 }) {
  const logo = ADVERTISER_LOGO[name] || { initials: (name||'?')[0], bg:'#F0F0F0', fg:'rgba(0,0,0,0.55)' };
  const [imgOk, setImgOk] = useState(!!logo.url);

  if (logo.url && imgOk) {
    return React.createElement('div', {
      style: {
        width: size, height: size, borderRadius: '50%',
        background: '#fff', border: '1px solid #e8e8e8',
        flexShrink: 0, overflow: 'hidden',
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
        verticalAlign: 'middle',
      }
    }, React.createElement('img', {
      src: logo.url,
      style: { width: '100%', height: '100%', objectFit: 'contain', padding: Math.round(size * 0.1) },
      onError: () => setImgOk(false),
    }));
  }

  return React.createElement(Avatar, {
    size,
    shape: 'circle',
    style: { background: logo.bg, color: logo.fg, fontWeight: 700, fontSize: size * 0.38, flexShrink: 0 },
  }, logo.initials);
}

// Parsing budget string "€ 22.000" → 22000
function parseBudget(str) {
  return parseInt((str || '0').replace(/[^\d]/g, ''), 10) || 0;
}
function formatEuro(n) {
  return '€\u00a0' + n.toLocaleString('it-IT');
}

// ── Pricing ──────────────────────────────────────────────────────────────────
const LONG_TERM_THRESHOLD = 30;   // giorni — soglia per tariffa long-term
const LONG_TERM_DISCOUNT  = 0.15; // sconto 15% per contratti > soglia
const MODEL_FILTER_MAP    = { 'Standard': 'standard', 'Lungo termine': 'long_term_only' };

// Parsing date "dd/mm/yyyy" → Date (usata in tutto il file)
const parseDate = s => { if (!s) return null; const [d,m,y] = s.split('/'); return new Date(+y, +m-1, +d); };

// Restituisce { days } dalla pianificazione (start/end in formato "dd/mm/yyyy")
function parsePlanningDates(planning) {
  if (!planning?.start || !planning?.end) return { days: 14 };
  const days = Math.max(1, Math.round((parseDate(planning.end) - parseDate(planning.start)) / 86400000) + 1);
  return { days };
}

// Calcola il prezzo di una faccia per il periodo specifico della pianificazione
// Ritorna { unitLabel, units, unitPrice, discount, total, isLongTerm, isIncompatible }
function computeFacePrice(face, planning) {
  if (!face) return { unitLabel: '—', units: 0, unitPrice: 0, discount: 0, total: 0, isLongTerm: false, isIncompatible: false };
  const { days }   = parsePlanningDates(planning);
  const unitPrice  = face.price || 0;

  if (planning?.category === 'DOOH') {
    // DOOH: minimo 7gg, pro-rata settimanale
    const weeks = Math.ceil(Math.max(days, 7) / 7);
    return { unitLabel: weeks === 1 ? 'slot/sett' : 'slot · ' + weeks + ' sett', units: weeks, unitPrice, discount: 0, total: unitPrice * weeks, isLongTerm: false, isIncompatible: false };
  }

  // OOH: prezzo proporzionale ai giorni reali (unitPrice = tariffa base/14gg)
  const isLongTerm     = days >= LONG_TERM_THRESHOLD;
  const discount       = isLongTerm ? LONG_TERM_DISCOUNT : 0;
  const isLongTermOnly = face.saleModel === 'long_term_only';
  const isIncompatible = isLongTermOnly && !isLongTerm;
  const dailyRate      = unitPrice / 14;
  const total          = Math.round(dailyRate * days * (1 - discount) / 10) * 10;
  const unitLabel      = 'giorni';
  return { unitLabel, units: days, unitPrice: Math.round(dailyRate), discount, total, isLongTerm, isIncompatible };
}

// Tipo di vendita leggibile (es. "2 quattordicine · 28 giorni", "Long term · 92 giorni", "Standard · 7 giorni")
function saleTypeLabel(planning) {
  const { days } = parsePlanningDates(planning);
  const daysLabel = `${days} ${days === 1 ? 'giorno' : 'giorni'}`;
  if (planning?.category === 'DOOH') {
    return `${days === 7 ? 'Standard' : 'Custom'} · ${daysLabel}`;
  }
  if (days >= LONG_TERM_THRESHOLD) {
    return `Long term · ${daysLabel}`;
  }
  const quatt = Math.ceil(days / 14);
  return `${quatt} ${quatt === 1 ? 'quattordicina' : 'quattordicine'} · ${daysLabel}`;
}

// Etichetta durata per il planning (es. "28 giorni")
function planningDurationLabel(planning) {
  const { days } = parsePlanningDates(planning);
  return `${days} ${days === 1 ? 'giorno' : 'giorni'}`;
}

// ══════════════════════════════════════════════════════
// MINI CALENDAR
// ══════════════════════════════════════════════════════

function MiniCalendar({ start = '10/05/2025', end = '24/05/2025', planning }) {
  const DAY_LABELS  = ['Do', 'Lu', 'Ma', 'Me', 'Gi', 'Ve', 'Sa'];
  const MONTH_NAMES = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

  const startDate = parseDate(start);
  const endDate   = parseDate(end);

  const [viewYear,  setViewYear]  = useState(startDate.getFullYear());
  const [viewMonth, setViewMonth] = useState(startDate.getMonth());

  const today = new Date();

  const daysInMonth     = new Date(viewYear, viewMonth + 1, 0).getDate();
  const daysInPrevMonth = new Date(viewYear, viewMonth, 0).getDate();
  const firstDayOfWeek  = new Date(viewYear, viewMonth, 1).getDay(); // 0=Dom

  // Build grid cells
  const cells = [];
  // Prev-month tail
  for (let i = firstDayOfWeek - 1; i >= 0; i--)
    cells.push({ day: daysInPrevMonth - i, outside: true });
  // Current month
  for (let d = 1; d <= daysInMonth; d++)
    cells.push({ day: d, outside: false });
  // Next-month head (fill to complete last row)
  let nextDay = 1;
  while (cells.length % 7 !== 0)
    cells.push({ day: nextDay++, outside: true });

  const isCampaign = cell => {
    if (cell.outside) return false;
    const d = new Date(viewYear, viewMonth, cell.day);
    return d >= startDate && d <= endDate;
  };
  const isToday = cell => {
    if (cell.outside) return false;
    return cell.day === today.getDate() &&
           viewMonth === today.getMonth() &&
           viewYear  === today.getFullYear();
  };

  const prevMonth = () => {
    if (viewMonth === 0) { setViewYear(y => y - 1); setViewMonth(11); }
    else setViewMonth(m => m - 1);
  };
  const nextMonth = () => {
    if (viewMonth === 11) { setViewYear(y => y + 1); setViewMonth(0); }
    else setViewMonth(m => m + 1);
  };

  return React.createElement('div', { className: 'mini-cal' },
    // Month navigation
    React.createElement('div', { className: 'mini-cal-header' },
      React.createElement('button', { onClick: prevMonth },
        React.createElement(LeftOutlined, { style: { fontSize: 10 } })),
      React.createElement(Typography.Text, { style: { fontSize: 12, fontWeight: 500 } },
        `${MONTH_NAMES[viewMonth]} ${viewYear}`),
      React.createElement('button', { onClick: nextMonth },
        React.createElement(RightOutlined, { style: { fontSize: 10 } }))
    ),
    // Day grid
    React.createElement('div', { className: 'mini-cal-grid' },
      ...DAY_LABELS.map(d =>
        React.createElement('div', { key: d, className: 'mini-cal-day-label' }, d)
      ),
      ...cells.map((cell, i) => {
        const campaign = isCampaign(cell);
        const todayCell = isToday(cell);
        let outerCls = 'mini-cal-cell';
        let innerCls = 'mini-cal-day';
        if (cell.outside) outerCls += ' outside';
        if (campaign)     outerCls += ' in-range';
        if (todayCell)    innerCls += ' today';
        return React.createElement('div', { key: i, className: outerCls },
          React.createElement('div', { className: innerCls }, cell.day)
        );
      })
    ),
    // Footer — tipo di vendita (se planning disponibile) oppure date
    planning
      ? React.createElement('div', { className: 'mini-cal-footer' },
          React.createElement('span', { style: { fontWeight: 500, color: 'rgba(0,0,0,0.65)' } },
            saleTypeLabel(planning)
          ),
        )
      : React.createElement('div', { className: 'mini-cal-footer' },
          React.createElement('span', null,
            React.createElement('span', { className: 'mini-cal-footer-label' }, 'Inizio: '), start),
          React.createElement('span', null,
            React.createElement('span', { className: 'mini-cal-footer-label' }, 'Fine: '), end)
        )
  );
}

// Controlla se un sistema soddisfa il filtro zone (OR: almeno un match)
function sysMatchesZones(sys, selectedZones) {
  if (selectedZones.length === 0) return true;
  return selectedZones.some(z => {
    if (z === sys.province) return true;           // codice provincia, es. 'PA'
    if (z === sys.city) return true;               // nome città, es. 'Palermo'
    const nhCity = ZONE_CITY_MAP[z];               // quartiere → città
    return nhCity && nhCity === sys.city;
  });
}

                : React.createElement(Text, { style: { fontSize: 11, color: 'rgba(0,0,0,0.25)', fontStyle: 'italic' } },
                    'Seleziona impianti per stimare'
                  )
            )
          );
        })
      )
    )
  );
}

function SelectSystems({ planning, onBack, onApply }) {
  const readOnly = planning.state === 'Completata';
  const [searchQuery, setSearchQuery]           = useState('');
  const [showSuggestions, setShowSuggestions]   = useState(false);
  const [selectedFaceIds, setSelectedFaceIds]   = useState(() => new Set(planning.selectedFaces || []));
  const [expandedSysIds, setExpandedSysIds]     = useState(new Set());
  const [hoveredId, setHoveredId]               = useState(null);
  const [focusedId, setFocusedId]               = useState(null);
  const [panelOpen, setPanelOpen]               = useState(true);
  const [panelTab, setPanelTab]                 = useState(readOnly ? 'selected' : 'results');
  const [filterDrawerOpen, setFilterDrawerOpen] = useState(false);
  const [poiDrawerOpen, setPoiDrawerOpen]       = useState(false);
  const [visibleStates, setVisibleStates]       = useState(['Available']);
  const channelAllTypes = planning.category === 'DOOH' ? DOOH_ALL_TYPES : OOH_ALL_TYPES;
  const channelTypesFlat = Object.values(channelAllTypes).flat();
  const [selectedTypes, setSelectedTypes]       = useState(channelTypesFlat);
  const defaultModels = planning.category === 'DOOH' ? [] : (parsePlanningDates(planning).days >= LONG_TERM_THRESHOLD ? ['Lungo termine'] : ['Standard']);
  const [selectedModels, setSelectedModels]     = useState(defaultModels);
  const [selectedIllumination, setSelectedIllumination] = useState([]);
  const [minFacesEnabled, setMinFacesEnabled]   = useState(false);
  const [minFacesValue, setMinFacesValue]       = useState(2);
  const [selectedZones, setSelectedZones]         = useState([]);
  const [selectedFormats, setSelectedFormats]     = useState([]);
  const [maxPriceEnabled, setMaxPriceEnabled]     = useState(false);
  const [maxPriceValue, setMaxPriceValue]         = useState(300);
  const [showOnlySelected, setShowOnlySelected]   = useState(!!(planning.selectedFaces && planning.selectedFaces.length > 0));
  const [showBrief, setShowBrief]                 = useState(true);

  // Conteggio filtri attivi (esclude stato commerciale, gestito visivamente a parte)
  const activeFilterCount = [
    selectedTypes.length !== channelTypesFlat.length,
    selectedIllumination.length > 0 && selectedIllumination.length < 2,
    selectedModels.join() !== defaultModels.join(),
    minFacesEnabled,
    selectedFormats.length > 0,
    maxPriceEnabled,
  ].filter(Boolean).length;

  const resetFilters = () => {
    setSelectedTypes(channelTypesFlat);
    setSelectedModels(defaultModels);
    setSelectedIllumination([]);
    setMinFacesEnabled(false);
    setVisibleStates(['Available']);
    setSelectedFormats([]);
    setMaxPriceEnabled(false);
  };

  // Helper: sistema soddisfa filtro illuminazione
  const sysMatchesIllumination = (r) => {
    if (selectedIllumination.length === 0 || selectedIllumination.length >= 2) return true;
    const wantIllum = selectedIllumination.includes('Illuminate');
    return (r.faceObjs || []).some(f => f.illuminated === wantIllum);
  };
  // Helper: prezzo minimo faccia disponibile
  const sysMinFacePrice = (r) => {
    const prices = (r.faceObjs || []).filter(f => f.state !== 'Reserved').map(f => f.price);
    return prices.length ? Math.min(...prices) : Infinity;
  };

  // ── Label system ─────────────────────────────────────────
  const [availableLabels, setAvailableLabels]   = useState(INITIAL_LABELS);
  const [systemLabels, setSystemLabels]         = useState({
    'SYS-001': ['lbl-1'],   // Ottima visibilità
    'SYS-002': ['lbl-6'],   // Centro storico
    'SYS-004': ['lbl-3'],   // Fronte traffico
    'SYS-006': ['lbl-4'],   // Posizione angolare
    'SYS-008': ['lbl-5'],   // Grande formato
    'SYS-010': ['lbl-2'],   // Alta frequentazione
    'SYS-013': ['lbl-1'],   // Ottima visibilità
    'SYS-015': ['lbl-3'],   // Fronte traffico
    'SYS-017': ['lbl-4'],   // Posizione angolare
    'SYS-020': ['lbl-6'],   // Centro storico
    'SYS-023': ['lbl-5'],   // Grande formato
    'SYS-027': ['lbl-2'],   // Alta frequentazione
  });      // { sysId: labelId[] — max 1 }
  const [pickerOpenId, setPickerOpenId]         = useState(null);    // sistema con picker aperto
  const [newLabelName, setNewLabelName]         = useState('');
  const [newLabelColor, setNewLabelColor]       = useState(LABEL_COLORS[0]);
  const [showNewForm, setShowNewForm]           = useState(false);

  const toggleSysLabel = (sysId, labelId) => {
    setSystemLabels(prev => {
      const cur = prev[sysId]?.[0];
      // stessa label → rimuovi; diversa → sostituisci
      return { ...prev, [sysId]: cur === labelId ? [] : [labelId] };
    });
  };
  const createLabel = () => {
    if (!newLabelName.trim()) return;
    const lbl = { id: `lbl-${Date.now()}`, name: newLabelName.trim(), color: newLabelColor };
    setAvailableLabels(prev => [...prev, lbl]);
    setNewLabelName('');
    setShowNewForm(false);
  };
  const closePicker = () => { setPickerOpenId(null); setShowNewForm(false); setNewLabelName(''); };

  const renderLabelPicker = (sysId) => {
    const current = systemLabels[sysId]?.[0] || null;
    return React.createElement('div', { className: 'ss-label-picker', onClick: e => e.stopPropagation() },
      React.createElement('div', { className: 'ss-label-picker-title' }, current ? 'Cambia etichetta' : 'Etichetta'),
      availableLabels.map(lbl => {
        const isSelected = current === lbl.id;
        return React.createElement('div', {
          key: lbl.id,
          className: 'ss-label-picker-row',
          onClick: () => { toggleSysLabel(sysId, lbl.id); closePicker(); },
          style: isSelected ? { background: lbl.color + '12' } : {},
        },
          React.createElement('span', {
            style: {
              width: 14, height: 14, borderRadius: '50%', flexShrink: 0,
              background: isSelected ? lbl.color : 'transparent',
              border: `2px solid ${lbl.color}`,
              display: 'inline-block',
            },
          }),
          React.createElement('span', { style: { fontSize: 13, color: 'rgba(0,0,0,0.75)' } }, lbl.name),
        );
      }),
      React.createElement('div', { style: { borderTop: '1px solid #F0F0F0', margin: '8px 0 4px' } }),
      !showNewForm
        ? React.createElement('div', {
            style: { display: 'flex', alignItems: 'center', gap: 6, padding: '4px 0', cursor: 'pointer', color: '#3E00FB', fontSize: 13 },
            onClick: () => setShowNewForm(true),
          },
            React.createElement(PlusOutlined, { style: { fontSize: 11 } }),
            'Nuova etichetta',
          )
        : React.createElement('div', null,
            React.createElement(Input, {
              size: 'small', autoFocus: true,
              placeholder: 'Nome etichetta',
              value: newLabelName,
              onChange: e => setNewLabelName(e.target.value),
              onPressEnter: createLabel,
              style: { marginBottom: 8 },
            }),
            React.createElement('div', { className: 'ss-color-palette' },
              ...LABEL_COLORS.map(c =>
                React.createElement('span', {
                  key: c,
                  className: 'ss-color-swatch',
                  style: {
                    background: c,
                    outline: newLabelColor === c ? `2px solid ${c}` : 'none',
                    outlineOffset: 2,
                  },
                  onClick: () => setNewLabelColor(c),
                })
              )
            ),
            React.createElement('div', { style: { display: 'flex', gap: 6, justifyContent: 'flex-end' } },
              React.createElement(Button, { size: 'small', onClick: () => { setShowNewForm(false); setNewLabelName(''); } }, 'Annulla'),
              React.createElement(Button, { size: 'small', type: 'primary', onClick: createLabel, disabled: !newLabelName.trim() }, 'Crea'),
            )
          )
    );
  };

  // ── Face/system selection helpers ───────────────────────
  const getAvailFaces  = (sys) => (sys.faceObjs||[]).filter(f => f.state !== 'Reserved');
  const getSelFaces    = (sys) => (sys.faceObjs||[]).filter(f => selectedFaceIds.has(f.id));
  const sysCheckState  = (sys) => {
    const avail = getAvailFaces(sys);
    const sel   = getSelFaces(sys);
    if (sel.length === 0)  return 'none';
    if (avail.length > 0 && sel.length >= avail.length) return 'all';
    return 'partial';
  };
  const toggleSys = (sys) => {
    if (readOnly) return;
    setSelectedFaceIds(prev => {
      const next = new Set(prev);
      const cs   = sysCheckState(sys);
      if (cs === 'none' || cs === 'partial') {
        getAvailFaces(sys).forEach(f => next.add(f.id));
      } else {
        (sys.faceObjs||[]).forEach(f => next.delete(f.id));
      }
      return next;
    });
  };
  const toggleFace = (face) => {
    if (readOnly || face.state === 'Reserved') return;
    setSelectedFaceIds(prev => {
      const next = new Set(prev);
      if (next.has(face.id)) next.delete(face.id); else next.add(face.id);
      return next;
    });
  };
  const toggleExpand = (sysId, e) => {
    e.stopPropagation();
    setExpandedSysIds(prev => {
      const next = new Set(prev);
      if (next.has(sysId)) next.delete(sysId); else next.add(sysId);
      return next;
    });
  };

  // Derived: which systems have ≥1 face selected (for map markers)
  const selectedSystemIds = React.useMemo(() => {
    const ids = new Set();
    SEARCH_RESULTS.forEach(s => {
      if ((s.faceObjs||[]).some(f => selectedFaceIds.has(f.id))) ids.add(s.id);
    });
    return ids;
  }, [selectedFaceIds]);

  const mapContainerRef = React.useRef(null);
  const leafletMapRef   = React.useRef(null);
  const clusterGroupRef = React.useRef(null);


  const suggestions = searchQuery.length >= 2
    ? GEO_SUGGESTIONS.filter(s => s.label.toLowerCase().includes(searchQuery.toLowerCase())).slice(0, 6)
    : [];

  const flyTo = (lat, lng, zoom) => {
    if (leafletMapRef.current) leafletMapRef.current.flyTo([lat, lng], zoom || 15, { duration: 0.8 });
    setShowSuggestions(false);
  };

  const resetMapView = () => {
    const map = leafletMapRef.current;
    if (!map) return;
    const zones = planning.briefZones || [];
    const PAD = 40;
    const pan = () => map.panBy([210, 0], { animate: true });
    if (zones.length === 0) {
      map.flyToBounds(L.latLngBounds(PLANNER.areaBounds), { padding: [PAD, PAD], duration: 0.8 });
      pan();
    } else if (zones.length === 1) {
      map.flyTo([zones[0].lat, zones[0].lng], zones[0].zoom || 14, { duration: 0.8 });
      pan();
    } else {
      map.flyToBounds(L.latLngBounds(zones.map(z => [z.lat, z.lng])), { padding: [PAD, PAD], maxZoom: 15, duration: 0.8 });
      pan();
    }
  };

  const makeIcon = (sys, isSelected, isHovered, isFocused, hasFocus) => {
    const zoom   = leafletMapRef.current ? leafletMapRef.current.getZoom() : 14;
    let [w, h]   = getMarkerSize(zoom);
    if (isFocused) { w = Math.round(w * 1.3); h = Math.round(h * 1.3); }
    const opacity = isFocused ? 1
      : hasFocus   ? 0.2
      : isSelected ? 1
      : isHovered  ? 0.95
      : 0.85;
    const filter = hasFocus && !isFocused
      ? 'none'
      : isSelected
        ? 'drop-shadow(0 2px 6px rgba(62,0,251,0.45)) drop-shadow(0 1px 3px rgba(0,0,0,0.3))'
        : isHovered
          ? 'drop-shadow(0 2px 5px rgba(0,0,0,0.35))'
          : 'drop-shadow(0 1px 3px rgba(0,0,0,0.22))';
    const badge = isSelected
      ? `<div style="position:absolute;top:-3px;right:-3px;width:10px;height:10px;background:#3E00FB;border-radius:50%;border:1.5px solid #fff;"></div>`
      : '';
    const ring = '';
    return L.divIcon({
      html: `<div style="position:relative;width:${w}px;height:${h}px">
        ${ring}
        <img src="${markerSrc(sys.type, sys.state)}"
             style="width:${w}px;height:${h}px;display:block;filter:${filter};opacity:${opacity}"/>
        ${badge}
      </div>`,
      className: '',
      iconSize:      [w, h],
      iconAnchor:    [w / 2, h],
      tooltipAnchor: [0, -h],
    });
  };

  // Init Leaflet
  // Pre-popola selezione mock per pianificazioni completate
  React.useEffect(() => {
    if (!readOnly) return;
    const count = planning.faces || 6;
    const mockFaces = new Set();
    const channelSystems = SEARCH_RESULTS.filter(s => s.channel === planning.category);
    for (const sys of channelSystems) {
      if (mockFaces.size >= count) break;
      const avail = (sys.faceObjs || []).filter(f => f.state !== 'Reserved');
      avail.slice(0, 1).forEach(f => mockFaces.add(f.id));
    }
    setSelectedFaceIds(mockFaces);
  }, []);

  React.useEffect(() => {
    if (!mapContainerRef.current || leafletMapRef.current) return;

    // Inizializza senza centro/zoom: verrà impostato via fitBounds dopo il setup
    const map = L.map(mapContainerRef.current);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 20,
    }).addTo(map);
    // saturate amplifica il tint blu dell'acqua → celeste; i grigi neutri (urbano) non hanno tonalità → invariati
    map.getPanes().tilePane.style.filter = 'url(#gravity-map)';

    const clusterColor = (n) => {
      if (n <= 2)  return { bg: '#D9F7BE', fg: '#135200' };
      if (n <= 5)  return { bg: '#B7EB8F', fg: '#135200' };
      if (n <= 10) return { bg: '#73D13D', fg: '#135200' };
      if (n <= 20) return { bg: '#52C41A', fg: '#fff' };
      if (n <= 50) return { bg: '#389E0D', fg: '#fff' };
      return               { bg: '#237804', fg: '#fff' };
    };

    const cluster = typeof L.markerClusterGroup === 'function'
      ? L.markerClusterGroup({
          maxClusterRadius: 40,
          showCoverageOnHover: false,
          spiderfyOnMaxZoom: true,
          iconCreateFunction: (c) => {
            const n = c.getChildCount();
            const { bg, fg } = clusterColor(n);
            const s = n <= 5 ? 32 : n <= 20 ? 36 : 40;
            return L.divIcon({
              html: `<div style="width:${s}px;height:${s}px;background:${bg};color:${fg};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,0.18);border:2px solid rgba(255,255,255,0.85);">${n}</div>`,
              className: '',
              iconSize: [s, s],
              iconAnchor: [s/2, s/2],
            });
          },
        })
      : L.layerGroup();

    map.addLayer(cluster);

    // Inquadratura iniziale basata sul brief.
    // La sidebar (420px) copre la destra: dopo fitBounds spostiamo il contenuto
    // a sinistra di metà sidebar con panBy([+210, 0]) così risulta centrato
    // nella porzione visibile.
    const zones = planning.briefZones || [];
    const PAD = 40;
    const pan = () => map.panBy([210, 0], { animate: false });
    if (zones.length === 0) {
      map.fitBounds(L.latLngBounds(PLANNER.areaBounds), { padding: [PAD, PAD] });
      pan();
    } else if (zones.length === 1) {
      map.setView([zones[0].lat, zones[0].lng], zones[0].zoom || 14);
      pan();
    } else {
      const bounds = L.latLngBounds(zones.map(z => [z.lat, z.lng]));
      map.fitBounds(bounds, { padding: [PAD, PAD], maxZoom: 15 });
      pan();
    }

    map.on('click', () => setFocusedId(null));

    leafletMapRef.current = map;
    clusterGroupRef.current = cluster;

    return () => { map.remove(); leafletMapRef.current = null; clusterGroupRef.current = null; };
  }, []);

  // Update markers on state change
  React.useEffect(() => {
    const cluster = clusterGroupRef.current;
    if (!cluster) return;
    cluster.clearLayers();

    const visible = SEARCH_RESULTS.filter(r => {
      if (r.channel !== planning.category) return false;
      if (showOnlySelected && !selectedSystemIds.has(r.id)) return false;
      if (!visibleStates.includes(r.state)) return false;
      if (selectedTypes.length !== channelTypesFlat.length && !selectedTypes.includes(r.type)) return false;
      if (selectedModels.length > 0 && !selectedModels.map(m => MODEL_FILTER_MAP[m]).includes(r.saleModel)) return false;
      if (minFacesEnabled && r.faces < minFacesValue) return false;
      if (!sysMatchesIllumination(r)) return false;
      if (maxPriceEnabled && sysMinFacePrice(r) > maxPriceValue) return false;
      return true;
    });
    const hasFocus = !!focusedId;
    visible.forEach(sys => {
      if (!sys.lat || !sys.lng) return;
      const isSel = selectedSystemIds.has(sys.id);
      const isHov = hoveredId === sys.id;
      const isFoc = focusedId === sys.id;
      const marker = L.marker([sys.lat, sys.lng], {
        icon: makeIcon(sys, isSel, isHov, isFoc, hasFocus),
        zIndexOffset: isFoc ? 2000 : isSel ? 1000 : isHov ? 500 : 0,
      });
      const faceCount = (sys.faceObjs||[]).length;
      const label     = sys.label ? `★ ${sys.label}` : `${sys.cimasa} · ${sys.type}`;
      marker.bindTooltip(
        `<b>${label}</b><br><span style="opacity:0.75">${sys.address} — ${faceCount} ${faceCount===1?'faccia':'facce'}</span>`,
        { direction: 'top', className: 'ss-leaflet-tooltip', offset: [0, -2] }
      );
      marker.on('click',     () => toggleSys(sys));
      marker.on('mouseover', () => setHoveredId(sys.id));
      marker.on('mouseout',  () => setHoveredId(null));
      cluster.addLayer(marker);
    });
  }, [selectedFaceIds, hoveredId, focusedId, visibleStates, selectedTypes, selectedModels, showOnlySelected, selectedSystemIds, minFacesEnabled, minFacesValue, selectedIllumination, maxPriceEnabled, maxPriceValue, selectedFormats]);

  const filteredSystems = SEARCH_RESULTS.filter(r => {
    if (r.channel !== planning.category) return false;
    if (!visibleStates.includes(r.state)) return false;
    if (selectedTypes.length !== channelTypesFlat.length && !selectedTypes.includes(r.type)) return false;
    if (selectedModels.length > 0 && !selectedModels.map(m => MODEL_FILTER_MAP[m]).includes(r.saleModel)) return false;
    if (minFacesEnabled && r.faces < minFacesValue) return false;
    if (!sysMatchesIllumination(r)) return false;
    if (maxPriceEnabled && sysMinFacePrice(r) > maxPriceValue) return false;
    if (selectedFormats.length > 0 && !(r.faceObjs || []).some(f => selectedFormats.includes(f.format))) return false;
    return true;
  });

  const displayedItems = panelTab === 'selected'
    ? SEARCH_RESULTS.filter(r => r.channel === planning.category && selectedSystemIds.has(r.id))
    : filteredSystems;

  // ── Select all / deselect all visible ──────────────────
  const allDisplayedAvailFaces = displayedItems.flatMap(s => getAvailFaces(s));
  const allDisplayedSelected   = allDisplayedAvailFaces.length > 0 &&
                                  allDisplayedAvailFaces.every(f => selectedFaceIds.has(f.id));
  const selectAllVisible = () => {
    setSelectedFaceIds(prev => {
      const next = new Set(prev);
      allDisplayedAvailFaces.forEach(f => next.add(f.id));
      return next;
    });
  };
  const deselectAllVisible = () => {
    setSelectedFaceIds(prev => {

      width: 480,
      open: filterDrawerOpen,
      onClose: () => setFilterDrawerOpen(false),
      footer: React.createElement('div', { style: { display: 'flex', justifyContent: 'space-between' } },
        React.createElement(Button, { danger: true, type: 'text', onClick: resetFilters }, 'Azzera tutto'),
        React.createElement(Button, { type: 'primary', onClick: () => setFilterDrawerOpen(false) }, 'Applica')
      ),
    },
      React.createElement(FilterPanel, {
        visibleStates, onVisibleStatesChange: setVisibleStates,
        selectedTypes, onSelectedTypesChange: setSelectedTypes,
        selectedFormats, onSelectedFormatsChange: setSelectedFormats,
        selectedModels, onSelectedModelsChange: setSelectedModels,
        selectedIllumination, onSelectedIlluminationChange: setSelectedIllumination,
        minFacesEnabled, onMinFacesEnabledChange: setMinFacesEnabled,
        minFacesValue, onMinFacesValueChange: setMinFacesValue,
        maxPriceEnabled, onMaxPriceEnabledChange: setMaxPriceEnabled,
        maxPriceValue, onMaxPriceValueChange: setMaxPriceValue,
        allTypes: channelAllTypes,
        planning,
      })
    ),

    // ── Drawer: POI ─────────────────────────────────────────
    React.createElement(Drawer, {
      title: 'Punti di interesse',
      placement: 'right',
      width: 400,
      open: poiDrawerOpen,
      onClose: () => setPoiDrawerOpen(false),
      footer: React.createElement('div', { style: { display: 'flex', justifyContent: 'flex-end', gap: 8 } },
        React.createElement(Button, { onClick: () => setPoiDrawerOpen(false) }, 'Chiudi'),
        React.createElement(Button, { type: 'primary', icon: React.createElement(EnvironmentOutlined) }, 'Applica POI')
      ),
    },
      React.createElement(POIPanel)
    )
      )    // close ss-main-nr
    )    // close ss-workspace-nr
    )    // close ss-content-nr
  );   // close ss-root-nr
}

// ══════════════════════════════════════════════════════
// APP ROOT
// ══════════════════════════════════════════════════════

function AppRoot() {
  const [view, setView] = useState('list');  // 'list' | 'detail' | 'select-systems'
  const [selectedPlanning, setSelectedPlanning] = useState(null);
  const [drawerOpen, setDrawerOpen] = useState(false);
  // Overrides di stato per plannings: riflette cambiamenti runtime nella lista
  const [stateOverrides, setStateOverrides] = useState({});

  // Compute which nav key is active based on current view
  const activeNavKey = (view === 'list' || view === 'detail' || view === 'select-systems')
    ? 'plannings'
    : 'overview';

  function handleNavSelect(key) {
    if (key === 'plannings') {
      setView('list');
      setSelectedPlanning(null);
    }
    // other keys: Overview, Inventory, Campaigns — navigazione futura
  }

  function handleSelectPlanning(planning) {
    setSelectedPlanning(planning);
    setView('select-systems');
  }

  function handleBackToList() {
    setView('list');
    setSelectedPlanning(null);
  }

  function handleStartPlanning() {
    setView('select-systems');
  }

  function handleApplySelection(selectedFaceIds) {
    setSelectedPlanning(prev => {
      if (!prev) return prev;
      const updated = { ...prev, hasSystems: true, state: 'In trattativa', faces: selectedFaceIds ? selectedFaceIds.size : prev.faces };
      setStateOverrides(o => ({ ...o, [prev.id]: 'In trattativa' }));
      return updated;
    });
    setView('list');
  }

  return React.createElement(ConfigProvider, { theme: window.GRAVITY_THEME },
    React.createElement(App, null,
      React.createElement('div', { className: 'app-shell' },
        React.createElement(TopNav, { activeNavKey, onNavSelect: handleNavSelect }),
        React.createElement('main', { className: 'app-main' },
          view === 'list' && React.createElement(PlanningsList, {
            onSelect: handleSelectPlanning,
            onNew: () => setDrawerOpen(true),
            stateOverrides,
          }),
          view === 'detail' && selectedPlanning && React.createElement(PlanningDetail, {
            planning: selectedPlanning,
            onBack: handleBackToList,
            onStartPlanning: handleStartPlanning,
          }),
          view === 'select-systems' && selectedPlanning && React.createElement(SelectSystems, {
            planning: selectedPlanning,
            onBack: () => setView('list'),
            onApply: handleApplySelection,
          })
        ),
        React.createElement(NewPlanningDrawer, {
          open: drawerOpen,
          onClose: () => setDrawerOpen(false),
          onCreate: () => setDrawerOpen(false),
        })
      )
    )
  );
}

// ── Mount ──────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(AppRoot));
</script>
</body>
</html>
